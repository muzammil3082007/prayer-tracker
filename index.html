<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Prayers</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #1a1208; --gold: #c9973a; --gold-light: #e8c97a;
    --cream: #fdf6e3; --cream-dark: #f5e9c8; --shadow: rgba(45,25,5,0.15);
    --green: #3d6b4f; --green-light: #5a9970;
    --red: #b94040; --orange: #c97a3a;
  }
  body {
    background: var(--cream); min-height: 100vh;
    font-family: 'Outfit', sans-serif;
    display: flex; align-items: flex-start; justify-content: center;
    padding: 32px 16px 60px;
  }
  .card {
    position: relative; z-index: 1; width: 100%; max-width: 440px;
    background: #fffdf5; border-radius: 4px;
    box-shadow: 0 2px 4px var(--shadow), 0 8px 32px var(--shadow), inset 0 0 0 1px rgba(201,151,58,0.2);
    overflow: hidden;
  }
  .card::before {
    content: ''; display: block; height: 5px;
    background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--green), var(--gold-light), var(--gold));
  }
  .tabs { display: flex; border-bottom: 1px solid var(--cream-dark); }
  .tab {
    flex: 1; padding: 13px 8px; font-size: 11px; font-weight: 600;
    letter-spacing: 1.5px; text-transform: uppercase; color: #b0a080;
    cursor: pointer; border: none; background: transparent;
    border-bottom: 2px solid transparent; transition: all 0.2s;
  }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); background: rgba(201,151,58,0.04); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  .header { padding: 24px 28px 18px; text-align: center; border-bottom: 1px solid var(--cream-dark); }
  .bismillah { font-family: 'Amiri', serif; font-size: 22px; color: var(--gold); letter-spacing: 2px; margin-bottom: 8px; }
  .header h1 { font-family: 'Amiri', serif; font-size: 28px; font-weight: 700; color: var(--ink); }
  .date-bar { display: flex; align-items: center; justify-content: center; padding: 10px 28px; background: var(--cream-dark); font-size: 12px; font-weight: 500; color: #7a6a4a; text-transform: uppercase; }
  .progress-section { padding: 16px 24px 10px; }
  .progress-bar { height: 6px; background: var(--cream-dark); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--green), var(--green-light)); width: 0%; transition: width 0.6s ease; }
  .prayers-list { padding: 8px 20px 16px; display: flex; flex-direction: column; gap: 6px; }
  .prayer-item {
    display: flex; align-items: center; gap: 14px; padding: 13px 16px; border-radius: 4px; cursor: pointer;
    border: 1px solid transparent; position: relative; transition: all 0.2s;
  }
  .prayer-item.done { background: rgba(61,107,79,0.06); border-color: rgba(61,107,79,0.2); }
  .checkbox { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--cream-dark); display: flex; align-items: center; justify-content: center; background: #fff; }
  .prayer-item.done .checkbox { background: var(--green); border-color: var(--green); }
  .prayer-info { flex: 1; }
  .prayer-name { font-size: 15px; font-weight: 600; color: var(--ink); }
  .prayer-arabic { font-family: 'Amiri', serif; font-size: 14px; color: var(--gold); }
  .prayer-time-display { font-size: 11px; color: #888; margin-top: 2px; }
  .rakaat-badge { font-size: 10px; padding: 2px 7px; border-radius: 99px; background: var(--cream-dark); color: #9a8a6a; }
  
  /* Monthly Analysis Styles */
  .monthly-panel { padding: 20px; }
  .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 18px; }
  .stat-box { background: var(--cream-dark); border-radius: 6px; padding: 12px 8px; text-align: center; }
  .stat-num { font-size: 20px; font-weight: 600; color: var(--ink); }
  .stat-label { font-size: 10px; color: #9a8a6a; text-transform: uppercase; margin-top: 4px; }
  .prayer-grid { display: flex; flex-direction: column; gap: 4px; max-height: 300px; overflow-y: auto; }
  .grid-row { display: grid; grid-template-columns: 30px repeat(5, 1fr); gap: 4px; align-items: center; margin-bottom: 2px; }
  .grid-cell { height: 20px; border-radius: 3px; background: var(--cream-dark); display: flex; align-items: center; justify-content: center; }
  .grid-cell.done { background: var(--green); }
  .grid-cell.missed { background: rgba(185,64,64,0.2); }
  .bar-chart { display: flex; align-items: flex-end; gap: 3px; height: 60px; margin-top: 20px; }
  .bar { flex: 1; background: var(--green); min-height: 2px; border-radius: 2px 2px 0 0; }
  .qadha-badge { font-size: 9px; color: var(--orange); background: rgba(201,151,58,0.1); padding: 1px 5px; border-radius: 4px; margin-left: 5px; }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="bismillah">﷽</div>
    <h1>Daily Prayers</h1>
  </div>
  <div class="date-bar"><span id="dateText">...</span></div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('today')">Today</button>
    <button class="tab" onclick="switchTab('monthly')">Monthly</button>
  </div>

  <div class="tab-panel active" id="panel-today">
    <div class="progress-section">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <div class="prayers-list" id="prayersList"></div>
  </div>

  <div class="tab-panel" id="panel-monthly">
    <div class="monthly-panel">
      <div class="stats-row">
        <div class="stat-box"><div class="stat-num" id="statDone">0</div><div class="stat-label">Prayed</div></div>
        <div class="stat-box"><div class="stat-num" id="statMissed">0</div><div class="stat-label">Missed</div></div>
        <div class="stat-box"><div class="stat-num" id="statPct">0%</div><div class="stat-label">Success</div></div>
      </div>
      <div class="prayer-grid" id="prayerGrid"></div>
      <div class="bar-chart" id="barChart"></div>
    </div>
  </div>
</div>

<script>
const prayers = [
  { id:'fajr', name:'Fajr', arabic:'الفجر', rakaat:'2 Rakaat' },
  { id:'dhuhr', name:'Dhuhr', arabic:'الظهر', rakaat:'4 Rakaat' },
  { id:'asr', name:'Asr', arabic:'العصر', rakaat:'4 Rakaat' },
  { id:'maghrib', name:'Maghrib', arabic:'المغرب', rakaat:'3 Rakaat' },
  { id:'isha', name:'Isha', arabic:'العشاء', rakaat:'4 Rakaat' }
];

let currentLat = 13.0827, currentLng = 80.2707;
const today = new Date();
let dayData = JSON.parse(localStorage.getItem('prayers_'+today.toDateString()) || '{"done":[],"qadha":[]}');
let todayTimes = {};

function switchTab(tab) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent.toLowerCase() === tab));
  if(tab === 'monthly') renderMonthly();
}

async function getTimes() {
  return new Promise(resolve => {
    navigator.geolocation.getCurrentPosition(async pos => {
      currentLat = pos.coords.latitude; currentLng = pos.coords.longitude;
      resolve(await fetchAPI());
    }, async () => resolve(await fetchAPI()));
  });
}

async function fetchAPI() {
  const d = today.getDate(), m = today.getMonth()+1, y = today.getFullYear();
  const url = `https://api.aladhan.com/v1/timings/${d}-${m}-${y}?latitude=${currentLat}&longitude=${currentLng}&method=1&school=1`;
  const res = await fetch(url);
  const json = await res.json();
  return json.data.timings;
}

function to12h(time) {
  if(!time) return "";
  let [h, m] = time.split(':').map(Number);
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return `${h}:${m < 10 ? '0'+m : m} ${ampm}`;
}

function buildTimes(timings) {
  const rules = {
    fajr: { s: timings.Fajr, e: timings.Sunrise },
    dhuhr: { s: timings.Dhuhr, e: timings.Asr },
    asr: { s: timings.Asr, e: timings.Maghrib },
    maghrib: { s: timings.Maghrib, e: timings.Isha },
    isha: { s: timings.Isha, e: "23:59" }
  };
  prayers.forEach(p => {
    todayTimes[p.id] = rules[p.id];
  });
}

function renderToday() {
  const list = document.getElementById('prayersList');
  list.innerHTML = "";
  prayers.forEach(p => {
    const isDone = dayData.done.includes(p.id) || dayData.qadha.includes(p.id);
    const item = document.createElement('div');
    item.className = `prayer-item ${isDone ? 'done' : ''}`;
    item.innerHTML = `
      <div class="checkbox"></div>
      <div class="prayer-info">
        <div class="prayer-name">${p.name} ${dayData.qadha.includes(p.id) ? '<span class="qadha-badge">Qadha</span>' : ''}</div>
        <div class="prayer-arabic">${p.arabic}</div>
        <div class="prayer-time-display">${to12h(todayTimes[p.id].s)} - ${to12h(todayTimes[p.id].e)}</div>
      </div>
      <div class="rakaat-badge">${p.rakaat}</div>
    `;
    item.onclick = () => togglePrayer(p.id);
    list.appendChild(item);
  });
  const count = dayData.done.length + dayData.qadha.length;
  document.getElementById('progressFill').style.width = (count/5*100) + "%";
}

function togglePrayer(id) {
  const now = new Date();
  const [h, m] = todayTimes[id].s.split(':').map(Number);
  const [eh, em] = todayTimes[id].e.split(':').map(Number);
  const start = new Date(); start.setHours(h, m, 0);
  const end = new Date(); end.setHours(eh, em, 0);

  if(dayData.done.includes(id) || dayData.qadha.includes(id)) {
    dayData.done = dayData.done.filter(x => x !== id);
    dayData.qadha = dayData.qadha.filter(x => x !== id);
  } else {
    if(now >= start && now <= end) dayData.done.push(id);
    else dayData.qadha.push(id);
  }
  localStorage.setItem('prayers_'+today.toDateString(), JSON.stringify(dayData));
  renderToday();
}

function renderMonthly() {
  const grid = document.getElementById('prayerGrid');
  const barChart = document.getElementById('barChart');
  grid.innerHTML = ""; barChart.innerHTML = "";
  let totalPrayed = 0, totalPossible = 0;

  for(let i=0; i<30; i++) {
    const d = new Date(); d.setDate(today.getDate() - i);
    const data = JSON.parse(localStorage.getItem('prayers_'+d.toDateString()) || '{"done":[],"qadha":[]}');
    const cnt = data.done.length + data.qadha.length;
    totalPrayed += cnt; totalPossible += 5;

    const row = document.createElement('div');
    row.className = 'grid-row';
    row.innerHTML = `<div>${d.getDate()}</div>`;
    prayers.forEach(p => {
      const isDone = data.done.includes(p.id) || data.qadha.includes(p.id);
      row.innerHTML += `<div class="grid-cell ${isDone ? 'done' : (d < today ? 'missed' : '')}"></div>`;
    });
    grid.appendChild(row);

    const bar = document.createElement('div');
    bar.className = 'bar';
    bar.style.height = (cnt/5*100) + "%";
    barChart.appendChild(bar);
  }
  document.getElementById('statDone').textContent = totalPrayed;
  document.getElementById('statMissed').textContent = totalPossible - totalPrayed;
  document.getElementById('statPct').textContent = Math.round(totalPrayed/totalPossible*100) + "%";
}

(async () => {
  document.getElementById('dateText').textContent = today.toDateString();
  const t = await getTimes();
  buildTimes(t);
  renderToday();
})();
</script>
</body>
</html>
